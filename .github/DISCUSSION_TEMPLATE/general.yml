title: "[Q&A] "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Describe your question in detail.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context, code snippets, or environment details.
      placeholder: Node version, agent type, relevant configuration...
    validations:
      required: false
